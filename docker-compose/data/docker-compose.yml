x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  influxdb1:
    restart: unless-stopped
    image: influxdb:latest
    container_name: influxdb1
    environment:
      - INFLUXDB_DB=db0
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=test_username
      - DOCKER_INFLUXDB_INIT_PASSWORD=test_password
      - DOCKER_INFLUXDB_INIT_ORG=test_org
      - DOCKER_INFLUXDB_INIT_BUCKET=test_bucket
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - app_net
    logging: *default-logging
  zookeeper:
    restart: unless-stopped
    hostname: zookeeper
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:6.1.1
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - app_net
    logging: *default-logging
  apache-kafka-broker1:
    restart: unless-stopped
    image: confluentinc/cp-enterprise-kafka:5.3.1
    hostname: broker
    container_name: ligeiaai-apache-kafka-broker-1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_METRIC_REPORTERS: io.confluent.metrics.reporter.ConfluentMetricsReporter
      CONFLUENT_METRICS_REPORTER_BOOTSTRAP_SERVERS: broker:29092
      CONFLUENT_METRICS_REPORTER_ZOOKEEPER_CONNECT: zookeeper:2181
      CONFLUENT_METRICS_REPORTER_TOPIC_REPLICAS: 1
      CONFLUENT_METRICS_ENABLE: "true"
      CONFLUENT_SUPPORT_CUSTOMER_ID: "anonymous"
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-1073741824}
      KAFKA_LOG_SEGMENT_BYTES: ${KAFKA_LOG_SEGMENT_BYTES:-268435456}
    networks:
      - app_net
    logging: *default-logging
  control-center:
    restart: unless-stopped
    image: confluentinc/cp-enterprise-control-center:5.3.1
    hostname: control-center
    container_name: ligeiaai-control-center
    depends_on:
      - zookeeper
      - apache-kafka-broker1
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: 'broker:29092'
      CONTROL_CENTER_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      CONTROL_CENTER_CONNECT_CLUSTER: 'connect:8088'
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021
    networks:
      - app_net
    logging: *default-logging
  rabbitmq:
    restart: unless-stopped
    image: rabbitmq:3-management
    hostname: rabbitmq
    container_name: ligeiaai-rabbitmq
    ports:
      - '15672:15672'
      - '5672:5672'
    networks:
      - app_net
    logging: *default-logging
  mosquitto:
    restart: unless-stopped
    image: eclipse-mosquitto:2
    user: mosquitto
    volumes:
      - type: bind
        source: ./config/
        target: /mosquitto/config/
      - type: bind
        source: ./log/
        target: /mosquitto/log/
      - type: volume
        source: data
        target: /mosquitto/data1/
    ports:
      - target: 1883
        published: 1883
        protocol: tcp
        mode: host
      - target: 9001
        published: 9001
        protocol: tcp
        mode: host
    networks:
      - app_net
    logging: *default-logging
  mqtt-publisher:
    profiles:
      - sim
    restart: unless-stopped
    image: mqtt-publisher:latest
    build:
      context: ../../mqtt-publisher
      dockerfile: Dockerfile
    depends_on:
      - mosquitto
    env_file:
      - ../.env
    environment:
      MQTT_PUBLISHER_HOST: ${MQTT_PUBLISHER_HOST:-mosquitto}
      MQTT_PUBLISHER_PORT: ${MQTT_PUBLISHER_PORT:-1883}
      MQTT_PUBLISHER_TOPIC: ${MQTT_PUBLISHER_TOPIC:-iot-inkai-raw}
      MQTT_PUBLISHER_LAYER: ${MQTT_PUBLISHER_LAYER:-Inkai}
      MQTT_PUBLISHER_TAG_IDS: ${MQTT_PUBLISHER_TAG_IDS-}
      MQTT_PUBLISHER_PUMPS: >-
        ${MQTT_PUBLISHER_PUMPS:-OPZ|P-2A;OPZ|P-2B;OPZ|P-2C;OPZ|P-3A;OPZ|P-3B;OPZ|P-3C;OPZ|P-85A;OPZ|P-85B;OPZ|P-85C;SAT-1|POS 151/1;SAT-1|POS 151/2;SAT-1|POS 151/3;SAT-1|POS 151/4;SAT-1|POS 161/1;SAT-1|POS 161/2;SAT-1|POS 161/3;SAT-1|POS 161/4;SAT-2|P3-P-101A;SAT-2|P3-P-101B;SAT-2|P3-P-101C;SAT-2|P3-P-111A;SAT-2|P3-P-111B;SAT-2|P3-P-111C}
      MQTT_PUBLISHER_INTERVAL_SECONDS: ${MQTT_PUBLISHER_INTERVAL_SECONDS:-5}
      MQTT_PUBLISHER_BASE_VALUE: ${MQTT_PUBLISHER_BASE_VALUE:-320}
      MQTT_PUBLISHER_JITTER: ${MQTT_PUBLISHER_JITTER:-10}
      MQTT_PUBLISHER_QOS: ${MQTT_PUBLISHER_QOS:-0}
      MQTT_PUBLISHER_USERNAME: ${MQTT_PUBLISHER_USERNAME:-}
      MQTT_PUBLISHER_PASSWORD: ${MQTT_PUBLISHER_PASSWORD:-}
    networks:
      - app_net
    logging: *default-logging
  nifi:
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/datapipline/Nifi/Dockerfile
    restart: unless-stopped
    image: 'nordal/nifi-linux:latest'
    container_name: apache_nifi
    env_file:
      - ../.env
    ports:
      - "8082:8082"
    volumes:
      - ../../:/datapipline
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      NIFI_WEB_HTTP_PORT: 8082
      NIFI_CLUSTER_IS_NODE: 'true'
      NIFI_CLUSTER_NODE_PROTOCOL_PORT: 8083
      NIFI_ZK_CONNECT_STRING: "zookeeper:2181"
      NIFI_ELECTION_MAX_WAIT: "1 min"
      NIFI_ZK_ROOT_NODE: "/nifi"
      NIFI_SENSITIVE_PROPS_KEY: '12345678912345'
      NIFI_BUNDLED_FLOW_MODE: ${NIFI_BUNDLED_FLOW_MODE:-replace}
    depends_on:
      - apache-kafka-broker1
      - zookeeper
    networks:
      - app_net
    logging: *default-logging
  connect:
    image: data-connect:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/dev/datapipelines/Dockerfile
    container_name: ligeiaai-connect
    hostname: connect
    ports:
      - "8088:8088"
    depends_on:
      - apache-kafka-broker1
    environment:
      CONNECT_BOOTSTRAP_SERVERS: broker:29092
      CONNECT_GROUP_ID: "connect-group"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-config-storage"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offset-storage"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status-storage"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.converters.ByteArrayConverter"
      CONNECT_INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_PLUGIN_PATH: "/usr/share/confluent-hub-components"
      CONNECT_REST_ADVERTISED_HOST_NAME: "connect"
      CONNECT_REST_HOST_NAME: "connect"
      CONNECT_REST_PORT: "8088"
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_LOG4J_ROOT_LOGLEVEL: "INFO"
      CLASSPATH: /usr/share/java/monitoring-interceptors/monitoring-interceptors-5.1.1.jar
      CONNECT_PRODUCER_INTERCEPTOR_CLASSES: "io.confluent.monitoring.clients.interceptor.MonitoringProducerInterceptor"
      CONNECT_CONSUMER_INTERCEPTOR_CLASSES: "io.confluent.monitoring.clients.interceptor.MonitoringConsumerInterceptor"
    networks:
      - app_net
    logging: *default-logging
  kafdrop:
    image: obsidiandynamics/kafdrop
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: broker:29092
    depends_on:
      - apache-kafka-broker1
    networks:
      - app_net
    logging: *default-logging
networks:
  app_net:
    external: true
volumes:
  influxdb-data: null
  influxdb-config: null
  zookeeper_data: null
  broker_data: null
  connect_data: null
  data:
    name: "mqtt-broker-data"
