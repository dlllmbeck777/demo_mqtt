x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  client:
    restart: unless-stopped
    image: app-client-prod:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/frontend-prod/Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL}
        REACT_APP_API_VERSION: ${REACT_APP_API_VERSION:-/api/v1}
        REACT_APP_WS_BASE_URL: ${REACT_APP_WS_BASE_URL}
        REACT_APP_COUCHDB_URL: ${REACT_APP_COUCHDB_URL}
        REACT_APP_COUCHDB_USER: ${REACT_APP_COUCHDB_USER}
        REACT_APP_COUCHDB_PASSWORD: ${REACT_APP_COUCHDB_PASSWORD}
        REACT_APP_INFLUX_URL: ${REACT_APP_INFLUX_URL}
        REACT_APP_INFLUX_TOKEN: ${REACT_APP_INFLUX_TOKEN}
        REACT_APP_INFLUX_ORG: ${REACT_APP_INFLUX_ORG}
        REACT_APP_INFLUX_LIVE_BUCKET: ${REACT_APP_INFLUX_LIVE_BUCKET}
        REACT_APP_INFLUX_BACKFILL_BUCKET: ${REACT_APP_INFLUX_BACKFILL_BUCKET}
        REACT_APP_INFLUX_BACKFILL_ALARM_BUCKET: ${REACT_APP_INFLUX_BACKFILL_ALARM_BUCKET}
        REACT_APP_INFLUX_BACKFILL_LOGS_BUCKET: ${REACT_APP_INFLUX_BACKFILL_LOGS_BUCKET}
        REACT_APP_INFLUX_ANOMALY_BUCKET: ${REACT_APP_INFLUX_ANOMALY_BUCKET}
        REACT_APP_LAYER_NAME: ${REACT_APP_LAYER_NAME}
        REACT_APP_DIAGNOSTIC_LAYER_NAME: ${DIAGNOSTIC_LAYER_NAME}
        REACT_APP_ENABLE_REDUX_LOGGER: ${REACT_APP_ENABLE_REDUX_LOGGER:-false}
        REACT_APP_ENABLE_ROUTER_DEBUG: ${REACT_APP_ENABLE_ROUTER_DEBUG:-false}
        FRONTEND_NODE_OPTIONS: ${FRONTEND_NODE_OPTIONS:---max-old-space-size=4096}
        FRONTEND_GENERATE_SOURCEMAP: ${FRONTEND_GENERATE_SOURCEMAP:-false}
    ports:
      - "80:80"
    networks:
      - app_net
    logging: *default-logging

  django:
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: /start
    container_name: ligeiaai-django-1
    env_file:
      - ../.env
    environment:
      - CELERY_BROKER=${CELERY_BROKER:-redis://redis:6379/1}
      - CELERY_BACKEND=${CELERY_BACKEND:-redis://redis:6379/1}
      - DJANGO_RUN_MODE=${DJANGO_RUN_MODE:-asgi}
    ports:
      - "8000:8000"
    networks:
      - app_net
    logging: *default-logging

  housekeeping:
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: /bin/sh -c "while true; do cd /django && python scripts/prune-runtime-data.py; sleep ${PRUNE_INTERVAL_SECONDS:-21600}; done"
    env_file:
      - ../.env
    networks:
      - app_net
    logging: *default-logging

  diagnostic-runtime:
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/run-diagnostic-runtime.py
    env_file:
      - ../.env
    networks:
      - app_net
    logging: *default-logging

  diagnostic-probes:
    profiles:
      - legacy-diagnostics
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/run-diagnostic-probes.py
    env_file:
      - ../.env
    networks:
      - app_net
    logging: *default-logging

  diagnostic-notifications-consumer:
    profiles:
      - legacy-diagnostics
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/consume-diagnostic-topic.py --topic notifications
    env_file:
      - ../.env
    networks:
      - app_net
    logging: *default-logging

  diagnostic-warnings-consumer:
    profiles:
      - legacy-diagnostics
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/consume-diagnostic-topic.py --topic warnings
    env_file:
      - ../.env
    networks:
      - app_net
    logging: *default-logging

  diagnostic-logs-consumer:
    profiles:
      - legacy-diagnostics
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/consume-diagnostic-topic.py --topic logs
    env_file:
      - ../.env
    networks:
      - app_net
    logging: *default-logging

networks:
  app_net:
    external: true
