services:
  frontend:
    restart: unless-stopped
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: ligeiaai-frontend-1
    env_file:
      - ../.env
    volumes:
      - ../../frontend:/frontend
      - frontend-node-modules:/frontend/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app_net
  client:
    restart: unless-stopped
    image: nginx
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_net
  django:
    restart: unless-stopped
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
    command: /start
    container_name: ligeiaai-django-1
    env_file:
      - ../.env
    volumes:
      - ../../:/django
    environment:
      - CELERY_BROKER=${CELERY_BROKER:-redis://redis:6379/1}
      - CELERY_BACKEND=${CELERY_BACKEND:-redis://redis:6379/1}
    ports:
      - "8000:8000"
    networks:
      - app_net
networks:
  app_net:
    external: true
volumes:
  frontend-node-modules: null
