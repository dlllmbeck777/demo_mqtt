x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  frontend:
    restart: unless-stopped
    image: app-frontend:latest
    build:
      context: ../../
      dockerfile: Dockerfile
    container_name: ligeiaai-frontend-1
    env_file:
      - ../.env
    volumes:
      - ../../frontend:/frontend
      - frontend-node-modules:/frontend/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=${CHOKIDAR_USEPOLLING:-false}
      - WATCHPACK_POLLING=${WATCHPACK_POLLING:-false}
    networks:
      app_net:
        aliases:
          - frontend
    logging: *default-logging
  client:
    restart: unless-stopped
    image: nginx
    depends_on:
      - frontend
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_net
    logging: *default-logging
  django:
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: /start
    container_name: ligeiaai-django-1
    env_file:
      - ../.env
    volumes:
      - ../../:/django
    environment:
      - CELERY_BROKER=${CELERY_BROKER:-redis://redis:6379/1}
      - CELERY_BACKEND=${CELERY_BACKEND:-redis://redis:6379/1}
      - DJANGO_RUN_MODE=${DJANGO_RUN_MODE:-asgi}
    ports:
      - "8000:8000"
    networks:
      - app_net
    logging: *default-logging
  housekeeping:
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: /bin/sh -c "while true; do cd /django && python scripts/prune-runtime-data.py; sleep ${PRUNE_INTERVAL_SECONDS:-21600}; done"
    env_file:
      - ../.env
    volumes:
      - ../../:/django
    networks:
      - app_net
    logging: *default-logging
  diagnostic-runtime:
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/run-diagnostic-runtime.py
    env_file:
      - ../.env
    volumes:
      - ../../:/django
    networks:
      - app_net
    logging: *default-logging
  diagnostic-probes:
    profiles:
      - legacy-diagnostics
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/run-diagnostic-probes.py
    env_file:
      - ../.env
    volumes:
      - ../../:/django
    networks:
      - app_net
    logging: *default-logging
  diagnostic-notifications-consumer:
    profiles:
      - legacy-diagnostics
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/consume-diagnostic-topic.py --topic notifications
    env_file:
      - ../.env
    volumes:
      - ../../:/django
    networks:
      - app_net
    logging: *default-logging
  diagnostic-warnings-consumer:
    profiles:
      - legacy-diagnostics
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/consume-diagnostic-topic.py --topic warnings
    env_file:
      - ../.env
    volumes:
      - ../../:/django
    networks:
      - app_net
    logging: *default-logging
  diagnostic-logs-consumer:
    profiles:
      - legacy-diagnostics
    restart: unless-stopped
    image: app-django:latest
    build:
      context: ../../
      dockerfile: ./all_dockerfiles/local/django/Dockerfile
      args:
        DJANGO_REQUIREMENTS_FILE: ${DJANGO_REQUIREMENTS_FILE:-deploy.txt}
    command: python /django/scripts/consume-diagnostic-topic.py --topic logs
    env_file:
      - ../.env
    volumes:
      - ../../:/django
    networks:
      - app_net
    logging: *default-logging
networks:
  app_net:
    external: true
volumes:
  frontend-node-modules: null
